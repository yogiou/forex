app {
  http {
    host = "0.0.0.0"
    port = 8081
    timeout = 40 seconds
  }
  oneframe {
    base-url = "http://localhost:8080"
    token = "10dc303535874aeccc86a8251e6992f5"
    # default: use OneFrame service; set true to use in-memory dummy when OneFrame is unavailable
    use-dummy = false
    cache-ttl-minutes = 5
    retry {
      enabled = true
      max-attempts = 3
      wait-between-attempts = 1 second
    }
    circuit-breaker {
      enabled = true
      failure-rate-threshold = 50
      wait-duration-in-open-state = 30 seconds
      sliding-window-size = 10
      minimum-number-of-calls = 5
    }
  }
}
